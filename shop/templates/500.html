{% extends "layouts/master.html" %}
{% load static %}
{% block content %}
<section class="py-20 px-6 md:px-12 lg:px-20">
  <div class="max-w-7xl mx-auto">

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 items-center justify-center min-h-96">

      <div class="col-span-full text-center py-20">
        <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-yellow-100 mb-8">
          <i class="fas fa-bug text-yellow-600 text-5xl animate-pulse"></i>
        </div>
        <h3 class="text-4xl font-bold mb-4">500 - Server Error</h3>
        <p class="text-2xl text-gray-400 mb-6">Something went wrong on our server.</p>
        <p class="text-lg text-gray-500 max-w-2xl mx-auto">
          Please try again later or contact support if the issue persists.
        </p>
        <div class="mt-8">
          <a href="/" class="inline-block px-6 py-3 bg-yellow-100 text-yellow-600 rounded-full font-bold animate-pulse">
            Go Back Home
          </a>
        </div>
      </div>

    </div>  
    
  </div>
</section>
{% endblock content %}
